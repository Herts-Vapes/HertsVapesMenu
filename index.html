<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="description" content="Herts Vapes live menu. Tap, build and send your order." />
  <title>Herts Vapes Menu</title>
  <link rel="stylesheet" href="style.css?v=hv-simple-v2" />
</head>
<body>
  <main class="site-shell" data-version="hv-simple-v2-20260717">
    <section class="hero" id="top">
      <div class="hero-focus">
        <div class="hero-logo-mark" aria-label="HV"><span>H</span><span>V</span></div>
        <div class="hero-brand">Herts <strong>Vapes</strong></div>
        <p class="hero-tagline">Fast. Reliable. Local.</p>

        <button class="hero-cta" type="button" data-scroll="#menu">
          <span aria-hidden="true">🛒</span>
          <span>Start Shopping</span>
        </button>

        <div class="hero-contact-actions" aria-label="Save or message Herts Vapes">
          <a class="hero-contact-button whatsapp" data-whatsapp-link href="#">💬 WhatsApp</a>
          <a class="hero-contact-button snapchat" data-snapchat-link href="#">👻 Snapchat</a>
        </div>
      </div>
    </section>

    <section class="shop" id="menu" aria-label="Build your order">
      <header class="shop-header">
        <div class="mini-brand"><span>H</span><strong>V</strong></div>
        <div>
          <p>HERTS VAPES</p>
          <h1>What do you want?</h1>
        </div>
      </header>

      <div class="category-list" id="categoryList"></div>

      <div class="more-area">
        <button class="more-toggle" id="moreToggle" type="button" aria-expanded="false">More</button>
        <div class="more-content" id="moreContent" hidden></div>
      </div>
    </section>

    <button class="order-bar" id="orderBar" type="button" hidden aria-label="Review and send your order">
      <span class="order-bar-main">
        <strong id="orderBarCount">1 item</strong>
        <small id="orderBarTotal">£0.00</small>
      </span>
      <span class="order-bar-action">Send Order →</span>
    </button>

    <div class="cart-overlay" id="cartOverlay" aria-hidden="true"></div>
    <section class="cart-drawer" id="cartDrawer" aria-label="Your order" aria-hidden="true">
      <div class="cart-handle" aria-hidden="true"></div>
      <header class="cart-header">
        <div>
          <p>YOUR ORDER</p>
          <h2>Check and send</h2>
        </div>
        <button class="cart-close" id="cartClose" type="button" aria-label="Close order">×</button>
      </header>
      <div class="cart-body" id="cartBody"></div>
      <footer class="cart-footer">
        <div class="cart-total"><span>Total</span><strong id="cartTotal">£0.00</strong></div>
        <button class="send-button whatsapp" id="cartWhatsapp" type="button">Send on WhatsApp</button>
        <button class="send-button snapchat" id="cartSnapchat" type="button">Copy &amp; Open Snapchat</button>
        <button class="cart-clear" id="cartClear" type="button">Clear order</button>
      </footer>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite">✓ Added</div>
  </main>

  <script src="settings.js?v=hv-simple-v2"></script>
  <script src="inventory.js?v=hv-simple-v2"></script>
  <script src="script.js?v=hv-simple-v2"></script>
</body>
</html>
